<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMO Onboarding Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F2;--surface:#fff;--surface2:#F0EEE8;--border:#E2DFD6;--border2:#C8C4B8;--text:#1A1916;--text2:#6B6860;--text3:#9B9890;--accent:#2D5A3D;--red:#C0392B;--red-light:#FDECEA;--amber:#B7770D;--amber-light:#FEF3DC;--green:#2D5A3D;--green-light:#E8F0EA;--blue:#1E4A7A;--blue-light:#E8F0F8;--mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-sec{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3);padding:12px 10px 4px;text-transform:uppercase}
.sb-foot{padding:16px;border-top:1px solid var(--border)}
.al-badge{background:var(--red-light);color:var(--red);font-size:11px;font-family:var(--mono);font-weight:500;padding:4px 10px;border-radius:100px;text-align:center;cursor:pointer}
.al-badge.ok{background:var(--green-light);color:var(--green)}
.topbar{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:700}
.topbar-r{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-family:var(--sans);cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9;color:#fff}
.btn svg{width:14px;height:14px}
.content{flex:1;overflow-y:auto;padding:24px}
.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.sum-card .lbl{font-size:11px;color:var(--text3);margin-bottom:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.sum-card .val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.sum-card .val.red{color:var(--red)}.sum-card .val.amber{color:var(--amber)}.sum-card .val.green{color:var(--green)}
.sum-card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.tbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.srch{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--sans);font-size:13px;background:var(--surface);color:var(--text);outline:none}
.srch:focus{border-color:var(--border2)}
select.flt{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--sans);font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .18s ease,box-shadow .18s ease,transform .18s ease;cursor:pointer;position:relative}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFAF8;box-shadow:0 3px 10px rgba(0,0,0,0.07);transform:translateY(-1px);z-index:1}
tbody tr.al-red{border-left:4px solid var(--red);background:linear-gradient(90deg,#FDECEA 0%,#FFFAF9 40px);animation:al-pulse 3s ease-in-out infinite}
tbody tr.al-amber{border-left:4px solid #E9A420;background:linear-gradient(90deg,#FEF3DC 0%,#FFFCF4 40px)}
tbody tr.al-red:hover{background:linear-gradient(90deg,#FAD5D2 0%,#FFF4F3 40px)}
tbody tr.al-amber:hover{background:linear-gradient(90deg,#FAE8B8 0%,#FFF8EC 40px)}
@keyframes al-dot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(0.7)}}
@keyframes al-pulse{0%,100%{box-shadow:inset 3px 0 0 var(--red)}50%{box-shadow:inset 3px 0 8px rgba(192,57,43,0.25)}}
tbody td{padding:11px 14px;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.person-cell{display:flex;align-items:center;gap:10px}
.person-name{font-weight:600;font-size:13px}
.metric-cell{display:flex;flex-direction:column;gap:2px}
.metric-val{font-size:13px;font-weight:500}
.metric-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0}
.sd-green{background:var(--green)}.sd-gray{background:var(--text3)}
.ib{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;line-height:0;transition:all .1s}
.ib:hover{color:var(--text);background:var(--surface2)}
.ib svg{width:15px;height:15px}
.ib.del:hover{color:var(--red)}
.mo{display:none;position:fixed;inset:0;background:rgba(26,25,22,.5);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--surface);border-radius:var(--rl);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.md-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.md-hd h3{font-size:15px;font-weight:700}
.md-bd{padding:20px 24px}
.md-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr{display:flex;flex-direction:column;gap:4px}
.fr.full{grid-column:1/-1}
.fr label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
.fr input,.fr select,.fr textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--sans);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.fr input:focus,.fr select:focus{border-color:var(--accent)}
.fr textarea{resize:vertical;min-height:56px}
.fsec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.fsec:first-child{border-top:none;padding-top:0;margin-top:0}
.dmd{width:640px}
.di-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.di-box{background:var(--surface2);border-radius:var(--r);padding:12px}
.di-box .dl{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.di-box .dv{font-size:14px;font-weight:500}
.cs{margin-bottom:20px}
.cs h4{font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mchart{display:flex;align-items:flex-end;gap:6px;height:56px}
.mchart-b{flex:0 0 auto;width:24px;border-radius:3px 3px 0 0;min-height:4px;cursor:default}
.mlabs{display:flex;gap:6px;margin-top:4px}
.mlabs span{width:24px;flex-shrink:0;font-size:9px;font-family:var(--mono);color:var(--text3);text-align:center}
.al-list{display:flex;flex-direction:column;gap:6px}
.al-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);font-size:12px}
.al-item.red{background:var(--red-light);color:var(--red)}
.al-item.amber{background:var(--amber-light);color:var(--amber)}
.al-item.ok{background:var(--green-light);color:var(--green)}
.al-item svg{width:14px;height:14px;flex-shrink:0}
.alf-list{display:flex;flex-direction:column;gap:8px}
.alf-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);cursor:pointer;transition:all .15s}
.alf-item:hover{border-color:var(--border2)}
.alf-item.red{border-left:4px solid var(--red)}
.alf-item.amber{border-left:4px solid #E9A420}
.al-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.al-dot.red{background:var(--red)}.al-dot.amber{background:#E9A420}
.aln{font-weight:700;font-size:13px;min-width:90px}
.alm{color:var(--text2);font-size:13px;flex:1}
.alch svg{width:14px;height:14px;color:var(--text3)}
.ptabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface2);border-radius:var(--r);padding:3px;width:fit-content}
.ptab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--sans);transition:all .15s}
.ptab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.page{display:none}.page.active{display:block}
.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.add-rec-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px dashed var(--border2);border-radius:var(--r);background:none;cursor:pointer;color:var(--text2);font-size:12px;font-family:var(--sans);width:100%;margin-top:8px;transition:all .15s}
.add-rec-btn:hover{background:var(--surface2);color:var(--text)}
.inline-form{background:var(--surface2);border-radius:var(--r);padding:12px;margin-top:8px;display:none}
.inline-form.open{display:block}
.if-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.if-grid .fr label{font-size:10px}
.if-grid .fr input,.if-grid .fr select{padding:6px 8px;font-size:12px}
</style>
</head>
<body>
<script>
(function(){
  var PASS='gmoc1122',KEY='ob_auth';
  if(sessionStorage.getItem(KEY)==='1')return;
  document.body.style.display='none';
  var ov=document.createElement('div');
  ov.innerHTML='<div style="position:fixed;inset:0;background:#F7F6F2;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Noto Sans JP,sans-serif"><div style="background:#fff;border:1px solid #E2DFD6;border-radius:12px;padding:40px 36px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.08)"><div style="font-size:13px;font-weight:700;margin-bottom:4px">GMO Onboarding Check</div><div style="font-size:11px;color:#9B9890;margin-bottom:28px">管理システム</div><div style="font-size:13px;font-weight:500;margin-bottom:10px">パスワードを入力してください</div><input id="pw-i" type="password" placeholder="Password" style="width:100%;padding:10px 12px;border:1px solid #E2DFD6;border-radius:8px;font-size:14px;outline:none;margin-bottom:8px;box-sizing:border-box"><div id="pw-e" style="font-size:12px;color:#C0392B;margin-bottom:8px;display:none">パスワードが違います</div><button id="pw-b" style="width:100%;padding:10px;background:#2D5A3D;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500">ログイン</button></div></div>';
  document.body.appendChild(ov);
  document.body.style.display='';
  document.getElementById('pw-b').onclick=function(){var v=document.getElementById('pw-i').value;if(v===PASS){sessionStorage.setItem(KEY,'1');location.reload();}else{document.getElementById('pw-e').style.display='block';document.getElementById('pw-i').value='';}};
  document.getElementById('pw-i').onkeydown=function(e){if(e.key==='Enter')document.getElementById('pw-b').click();};
  setTimeout(function(){document.getElementById('pw-i').focus();},100);
})();
</script>
<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div style="margin-bottom:8px"><img id="gmo-logo" style="height:28px;width:auto;display:block" alt="GMO"></div>
    <span style="font-size:12px;font-weight:600;color:var(--text);letter-spacing:-.02em;font-family:Inter,sans-serif">Onboarding Check</span>
  </div>
  <nav class="nav">
    <div class="nav-sec">メニュー</div>
    <button class="nav-item active" onclick="showPage('list',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>入社者一覧</button>
    <button class="nav-item" onclick="showPage('alerts',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>アラート</button>
    <button class="nav-item" onclick="showPage('stats',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>離職率・統計</button>
  </nav>
  <div class="sb-foot"><div id="sbBadge" class="al-badge ok">✓ アラートなし</div></div>
</aside>
<div class="main">
  <div class="topbar">
    <h2 id="pageTitle">入社者一覧</h2>
    <div class="topbar-r">
      <button class="btn" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV出力</button>
      <button class="btn btn-primary" onclick="openAdd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>入社者を追加</button>
    </div>
  </div>
  <div class="content">
    <div class="page active" id="page-list">
      <div class="sum-grid" id="sumGrid"></div>
      <div class="tbar">
        <input class="srch" id="srch" placeholder="名前・メンター・部長で検索..." oninput="renderTable()">
        <select class="flt" id="fltStatus" onchange="renderTable()"><option value="">全在籍状況</option><option>在籍</option><option>退職</option></select>
        <select class="flt" id="fltAlert" onchange="renderTable()"><option value="">全アラート</option><option value="red">緊急</option><option value="amber">要注意</option><option value="ok">正常</option></select>
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th style="width:90px">状態</th><th style="width:180px">氏名</th><th style="width:90px">入社日</th><th style="width:60px">在籍</th><th style="width:80px">期間</th>
          <th>メンター</th><th>部長</th>
          <th style="width:110px">CC最新</th><th style="width:110px">残業(最新)</th><th style="width:110px">KPI(最新)</th><th style="width:110px">勤怠(最新)</th><th style="width:90px">離職懸念度</th><th style="width:60px"></th>
        </tr></thead>
        <tbody id="tBody"></tbody>
      </table></div>
    </div>
    <div class="page" id="page-alerts"><div id="alertsContent"></div></div>
    <div class="page" id="page-stats"><div id="statsContent"></div></div>
  </div>
</div>
</div>
<!-- ADD MODAL -->
<div class="mo" id="addModal"><div class="md">
  <div class="md-hd"><h3>入社者を追加</h3><button class="ib" onclick="closeModal('addModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="md-bd"><div class="fsec">基本情報</div><div class="fg">
    <div class="fr"><label>氏名 *</label><input type="text" id="a-name" placeholder="山田 太郎"></div>
    <div class="fr"><label>入社日 *</label><input type="date" id="a-date"></div>
    <div class="fr"><label>満1年日</label><input type="date" id="a-date1y"></div>
    <div class="fr"><label>退職日</label><input type="date" id="a-retire"></div>
    <div class="fr"><label>在籍状況</label><select id="a-status"><option>在籍</option><option>退職</option></select></div>
    <div class="fr"><label>在籍期間</label><input type="text" id="a-tenure" placeholder="0年0ヶ月"></div>

  </div></div>
  <div class="md-ft"><button class="btn" onclick="closeModal('addModal')">キャンセル</button><button class="btn btn-primary" onclick="addPerson()">追加する</button></div>
</div></div>
<!-- EDIT MODAL -->
<div class="mo" id="editModal"><div class="md">
  <div class="md-hd"><h3>基本情報を編集</h3><button class="ib" onclick="closeModal('editModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="md-bd"><div class="fg">

    <div class="fr"><label>満1年日</label><input type="date" id="e-date1y"></div>
    <div class="fr"><label>退職日</label><input type="date" id="e-retire"></div>
    <div class="fr"><label>在籍状況</label><select id="e-status"><option>在籍</option><option>退職</option></select></div>
    <div class="fr"><label>在籍期間</label><input type="text" id="e-tenure"></div>
    <div class="fr"><label>メンター</label><input type="text" id="e-mentor"></div>

<!-- DETAIL MODAL -->
<div class="mo" id="detailModal"><div class="md dmd">
  <div class="md-hd">
    <h3 id="d-title">—</h3>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="openEditFromDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編集</button>
      <button class="ib" onclick="closeModal('detailModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>
  <div class="md-bd" id="detailBody"></div>

  try{
    const r=await fetch('/api/data');
    const d=await r.json();
    if(d.people&&d.people.length>0){
      people=d.people;
      nextId=Math.max(...people.map(p=>p.id))+1;
    } else {
      // 初回のみデフォルトデータをGASに保存
      people=getDefaultPeople();
      nextId=Math.max(...people.map(p=>p.id))+1;
      await saveAllToGAS();
    }
  }catch(e){
    console.error('GAS load error:',e);
    people=loadData();
    nextId=Math.max(...people.map(p=>p.id))+1;
  }
  isLoading=false;
  renderAll();
}
 
async function save(){
  // ローカルにもバックアップ保存
  localStorage.setItem('onboarding_v4',JSON.stringify(people));
}
 
async function savePersonToGAS(person){
  try{
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',person})});
  }catch(e){console.error('GAS save error:',e);}
}
 
async function deletePersonFromGAS(id){
  try{
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',id})});
  }catch(e){console.error('GAS delete error:',e);}
}
 
async function saveAllToGAS(){
  try{
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'saveAll',people})});
  }catch(e){console.error('GAS saveAll error:',e);}
}
 
function latestRec(arr){if(!arr||!arr.length)return null;return sortYM(arr).at(-1);}
function latestCC(p){const r=latestRec(p.records.cc);if(!r)return null;const s=r.score.reduce((a,b)=>a+b,0);return{score:s,ym:r.ym,detail:r.score};}
function prevCC(p,curYM){const sorted=sortYM(p.records.cc).filter(r=>r.ym<curYM);if(!sorted.length)return null;return sorted.at(-1).score.reduce((a,b)=>a+b,0);}
function latestOT(p){const r=latestRec(p.records.ot);return r?{v:r.value,ym:r.ym}:null;}
function latestKPI(p){const r=latestRec(p.records.kpi);if(!r||r.rate==null)return null;return{rate:r.rate,ym:r.ym};}
function latestAbs(p){const r=latestRec(p.records.abs);return r?{absent:r.absent,late:r.late,ym:r.ym}:null;}
 
const THRESHOLDS={ccWarn:15,otAmber:40,otRed:50,absAmber:3,absRed:5,riskAmber:2.5,riskRed:4.0,kpiRed:70,kpiAmber:90};
function getAlerts(p){
  const alerts=[],T=THRESHOLDS,cc=latestCC(p);
  if(cc){const s=cc.score,prev=prevCC(p,cc.ym),under=s<T.ccWarn,drop=prev!==null&&s<prev;if(under&&drop)alerts.push({type:'red',msg:`CC緊急 (${s}/30点、前回${prev}点から下落)`});else if(under)alerts.push({type:'amber',msg:`CCスコア低下 (${s}/30点)`});else if(drop)alerts.push({type:'amber',msg:`CC前回比下落 (${prev}→${s}点)`});}
  const ot=latestOT(p);if(ot){if(ot.v>=T.otRed)alerts.push({type:'red',msg:`残業超過 (${ot.v}h/月)`});else if(ot.v>=T.otAmber)alerts.push({type:'amber',msg:`残業増加傾向 (${ot.v}h/月)`});}
  const ab=latestAbs(p);if(ab){const t=ab.absent+ab.late;if(t>=T.absRed)alerts.push({type:'red',msg:`勤怠悪化 欠勤${ab.absent}+遅刻${ab.late}=${t} (${ymLabel(ab.ym)})`});else if(t>=T.absAmber)alerts.push({type:'amber',msg:`勤怠注意 欠勤${ab.absent}+遅刻${ab.late}=${t} (${ymLabel(ab.ym)})`});}
  if(p.records.interviews&&p.records.interviews.length){const lv=sortYM(p.records.interviews).at(-1);if(lv&&lv.risk!=null){if(lv.risk>=T.riskRed)alerts.push({type:'red',msg:`離職懸念度 高 (★${lv.risk}/5、${ymLabel(lv.ym)})`});else if(lv.risk>=T.riskAmber)alerts.push({type:'amber',msg:`離職懸念度 注意 (★${lv.risk}/5、${ymLabel(lv.ym)})`});}}
  return alerts;
}
function alertLevel(p){const a=getAlerts(p);return a.some(x=>x.type==='red')?'red':a.some(x=>x.type==='amber')?'amber':'ok';}
 
function renderSummary(){
  const total=people.length,active=people.filter(p=>p.status==='在籍').length,retired=total-active;
  const reds=people.filter(p=>alertLevel(p)==='red').length,ambers=people.filter(p=>alertLevel(p)==='amber').length;
  const allYears=[...new Set(people.map(p=>p.date?new Date(p.date).getFullYear():null).filter(Boolean))].sort();
  const yearCards=allYears.map(yr=>{
    const yp=people.filter(p=>p.date&&new Date(p.date).getFullYear()===yr);
    const ya=yp.filter(p=>p.status==='在籍').length,yr2=yp.filter(p=>p.status==='退職').length;
    const rr=(yp.length>0?(yr2/yp.length*100).toFixed(1):'0.0');
    return `<div class="sum-card" style="border-top:3px solid ${yr===2025?'#D4A843':yr===2026?'#5B8FD4':'var(--border2)'}">
      <div class="lbl" style="margin-bottom:12px">${yr}年入社</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div><div class="val" style="font-size:22px">${ya}</div><div class="sub" style="margin-top:4px">在籍</div></div>
        <div><div class="val" style="font-size:22px;color:var(--text2)">${yr2}</div><div class="sub" style="margin-top:4px">退職</div></div>
        <div><div class="val" style="font-size:22px;color:${parseFloat(rr)>20?'var(--red)':parseFloat(rr)>10?'var(--amber)':'var(--green)'}">${rr}%</div><div class="sub" style="margin-top:4px">離職率</div></div>
      </div></div>`;
  }).join('');
  document.getElementById('sumGrid').innerHTML=yearCards+`<div class="sum-card"><div class="lbl">緊急アラート</div><div class="val red">${reds}</div><div class="sub">要即対応</div></div><div class="sum-card"><div class="lbl">要注意</div><div class="val amber">${ambers}</div><div class="sub">経過観察</div></div>`;
  document.getElementById('sumGrid').style.gridTemplateColumns=`repeat(${allYears.length+2},1fr)`;
  const n=reds+ambers,badge=document.getElementById('sbBadge');
  badge.className='al-badge'+(n?'':' ok');badge.textContent=n?`⚠ アラート ${n}件`:'✓ アラートなし';
}
 
function renderTable(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const fs=document.getElementById('fltStatus').value,fa=document.getElementById('fltAlert').value;
  const rows=people.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.mentor||'').toLowerCase().includes(q)&&!(p.manager||'').toLowerCase().includes(q))return false;
    if(fs&&p.status!==fs)return false;
    if(fa&&alertLevel(p)!==fa)return false;
    return true;
  });
  const tb=document.getElementById('tBody');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="12"><div class="empty">該当者なし</div></td></tr>`;return;}
  rows.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let _lastYear=null;const _rows=[];
  rows.forEach(p=>{
    const al=alertLevel(p),isRetired=p.status==='退職';
    const joinYear=p.date?new Date(p.date).getFullYear():0;
    if(joinYear&&joinYear!==_lastYear){
      _rows.push(`<tr style="background:var(--surface2);border-top:2px solid var(--border2);border-bottom:1px solid var(--border)"><td colspan="12" style="padding:7px 14px;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text2);letter-spacing:.04em">${joinYear}年入社</td></tr>`);
      _lastYear=joinYear;
    }
    const alIcon=al==='red'
      ?`<span style="display:inline-flex;align-items:center;gap:5px;background:var(--red-light);color:var(--red);padding:4px 9px;border-radius:100px;font-size:11px;font-weight:700"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);animation:al-dot-pulse 1.2s ease-in-out infinite"></span>緊急</span>`
      :al==='amber'
      ?`<span style="display:inline-flex;align-items:center;gap:5px;background:var(--amber-light);color:var(--amber);padding:4px 9px;border-radius:100px;font-size:11px;font-weight:600"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#E9A420"></span>要注意</span>`
      :`<span style="display:inline-flex;align-items:center;gap:5px;background:var(--green-light);color:var(--green);padding:4px 9px;border-radius:100px;font-size:11px;font-weight:600"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>正常</span>`;
    const today=new Date(),joinDate=p.date?new Date(p.date):null;
    const oneYearPassed=joinDate&&(today-joinDate>=365*24*60*60*1000);
    const yearBadge=oneYearPassed?`<span style="font-size:10px;font-family:var(--mono);background:#E8F0F8;color:#1E4A7A;padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:500">1年経過</span>`:'';
    const nameCell=`<div class="person-cell"><div class="person-name">${p.name}${yearBadge}</div></div>`;
    const stB=isRetired
      ?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)"><span class="status-dot sd-gray"></span>退職</span>`
      :`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green)"><span class="status-dot sd-green"></span>在籍</span>`;
    const cc=latestCC(p),ccCol=cc?(cc.score<THRESHOLDS.ccWarn?'var(--amber)':'var(--green)'):'var(--text3)';
    const ccB=cc?`<div class="metric-cell"><div class="metric-val" style="color:${ccCol}">${cc.score}<span style="font-size:10px;color:var(--text3)">/30</span></div><div class="metric-sub">${ymLabel(cc.ym)}</div></div>`:`<span style="font-size:12px;color:var(--text3)">—</span>`;
    const ot=latestOT(p),otCol=ot?(ot.v>=THRESHOLDS.otRed?'var(--red)':ot.v>=THRESHOLDS.otAmber?'var(--amber)':'var(--text)'):'var(--text3)';
    const otB=ot?`<div class="metric-cell"><div class="metric-val" style="color:${otCol}">${parseFloat(ot.v).toFixed(1)}<span style="font-size:10px;color:var(--text3)">h</span></div><div class="metric-sub">${ymLabel(ot.ym)}</div></div>`:`<span style="font-size:12px;color:var(--text3)">—</span>`;
    const kpi=latestKPI(p),kpiCol=kpi?(kpi.rate<THRESHOLDS.kpiRed?'var(--red)':kpi.rate<THRESHOLDS.kpiAmber?'var(--amber)':'var(--green)'):'var(--text3)';
    const kpiB=kpi?`<div class="metric-cell"><div class="metric-val" style="color:${kpiCol}">${typeof kpi.rate==='number'?kpi.rate.toFixed(1):kpi.rate}<span style="font-size:10px;color:var(--text3)">%</span></div><div class="metric-sub">${ymLabel(kpi.ym)}</div></div>`:`<span style="font-size:12px;color:var(--text3)">—</span>`;
    const ab=latestAbs(p),abIssue=ab&&(ab.absent>0||ab.late>0);
    const abB=ab?`<div class="metric-cell"><div class="metric-val" style="color:${abIssue?'var(--amber)':'var(--text)'}">欠${ab.absent} 遅${ab.late}</div><div class="metric-sub">${ymLabel(ab.ym)}</div></div>`:`<span style="font-size:12px;color:var(--text3)">—</span>`;
    const latestIv=p.records.interviews&&p.records.interviews.length?sortYM(p.records.interviews).at(-1):null;
    const riskB=latestIv&&latestIv.risk!=null
      ?`<div class="metric-cell"><div class="metric-val" style="color:${latestIv.risk>=4?'var(--red)':latestIv.risk>=3?'var(--amber)':'var(--green)'}">★${latestIv.risk}<span style="font-size:10px;color:var(--text3)">/5</span></div><div class="metric-sub">${latestIv.date||ymLabel(latestIv.ym)}</div></div>`
      :`<span style="font-size:12px;color:var(--text3)">—</span>`;
    const retiredStyle=isRetired?'opacity:0.42;filter:grayscale(0.4)':'';
    _rows.push(`<tr class="${al==='red'?'al-red':al==='amber'?'al-amber':''}" onclick="openDetail(${p.id})" style="${retiredStyle}">
      <td>${alIcon}</td><td>${nameCell}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${p.date||'—'}</td>
      <td>${stB}</td><td style="font-size:12px;color:var(--text2)">${p.tenure||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${p.mentor||'—'}</td><td style="font-size:12px;color:var(--text2)">${p.manager||'—'}</td>
      <td>${ccB}</td><td>${otB}</td><td>${kpiB}</td><td>${abB}</td><td>${riskB}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">
        <button class="ib" onclick="openEditById(${p.id})" title="編集"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="ib del" onclick="deletePerson(${p.id})" title="削除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      </td></tr>`);
  });
  tb.innerHTML=_rows.join('');
}
 
function renderAlerts(){
  const items=[];people.forEach(p=>getAlerts(p).forEach(a=>items.push({...a,name:p.name,id:p.id})));
  const el=document.getElementById('alertsContent');
  if(!items.length){el.innerHTML=`<div class="empty" style="padding:64px">現在アラートはありません 🎉</div>`;return;}
  const reds=items.filter(i=>i.type==='red'),ambers=items.filter(i=>i.type==='amber');
  // 個人ごとにアラートをまとめる
  const byPerson={};
  items.forEach(a=>{
    if(!byPerson[a.id])byPerson[a.id]={id:a.id,name:a.name,type:'ok',msgs:[]};
    byPerson[a.id].msgs.push({type:a.type,msg:a.msg});
    if(a.type==='red'||byPerson[a.id].type==='ok')byPerson[a.id].type=a.type;
    if(a.type==='red')byPerson[a.id].type='red';
  });
  const personItems=Object.values(byPerson).sort((a,b)=>a.type==='red'?-1:b.type==='red'?1:0);
  const row=a=>`<div class="alf-item ${a.type}" onclick="openDetail(${a.id})">
    <div class="al-dot ${a.type}"></div>
    <div class="aln">${a.name}</div>
    <div class="alm" style="display:flex;flex-direction:column;gap:3px">${a.msgs.map(m=>`<span style="color:${m.type==='red'?'var(--red)':m.type==='amber'?'var(--amber)':'var(--text2)'};font-size:12px">${m.msg}</span>`).join('')}</div>
    <div class="alch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>`;
  const personReds=personItems.filter(i=>i.type==='red'),personAmbers=personItems.filter(i=>i.type==='amber');
  let h='';
  if(personReds.length)h+=`<div style="font-size:11px;font-weight:700;color:var(--red);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">緊急 (${personReds.length}名)</div><div class="alf-list" style="margin-bottom:20px">${personReds.map(row).join('')}</div>`;
  if(personAmbers.length)h+=`<div style="font-size:11px;font-weight:700;color:var(--amber);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">要注意 (${personAmbers.length}名)</div><div class="alf-list">${personAmbers.map(row).join('')}</div>`;
  el.innerHTML=h;
}
 
let statsYear=new Date().getFullYear();
function renderStats(){
  const allYears=new Set();people.forEach(p=>{if(p.date)allYears.add(new Date(p.date).getFullYear());});
  const years=[...allYears].sort();if(!years.length)years.push(new Date().getFullYear());
  if(!years.includes(statsYear))statsYear=years.at(-1);
  const yr=statsYear;
  const monthData=Array.from({length:12},(_,m)=>{
    const jm=people.filter(p=>{if(!p.date)return false;const d=new Date(p.date);return d.getFullYear()===yr&&d.getMonth()===m;});
    return{joined:jm.length,active:jm.filter(p=>p.status==='在籍').length,retired:jm.filter(p=>p.status==='退職').length};
  });
  const totalJoined=monthData.reduce((a,d)=>a+d.joined,0),totalRetired=monthData.reduce((a,d)=>a+d.retired,0);
  const rate=totalJoined>0?(totalRetired/totalJoined*100).toFixed(1):'0.0';
  const BAR_H=120,maxBar=Math.max(...monthData.map(d=>d.joined),1);
  const barHtml=monthData.map((d,i)=>{
    const hJ=d.joined>0?Math.round((d.joined/maxBar)*(BAR_H-20))+20:0;
    const hR=d.joined>0?Math.round((d.retired/d.joined)*hJ):0,hA=hJ-hR;
    const isCur=(new Date().getFullYear()===yr&&new Date().getMonth()===i);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0">
      <div style="height:18px;display:flex;align-items:flex-end;justify-content:center">${d.joined>0?`<span style="font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text2)">${d.joined}</span>`:''}</div>
      <div style="height:${BAR_H}px;width:100%;display:flex;flex-direction:column;justify-content:flex-end">
        ${d.joined>0?`<div style="width:100%;height:${hA}px;background:#378ADD;border-radius:${hR?'0 0':'4px 4px'} 0 0" title="${d.active}名在籍"></div>${hR>0?`<div style="width:100%;height:${hR}px;background:#BDBDBD;border-radius:4px 4px 0 0" title="${d.retired}名退職"></div>`:''}`:`<div style="width:100%;height:3px;background:var(--border);border-radius:2px"></div>`}
      </div>
      <div style="font-size:11px;font-family:var(--mono);color:${isCur?'var(--accent)':'var(--text3)'};font-weight:${isCur?'700':'400'}">${MONTHS[i].replace('月','')}</div>
    </div>`;
  }).join('');
  const yearTabs=years.map(y=>`<button class="ptab${y===yr?' active':''}" onclick="statsYear=${y};renderStats()">${y}年</button>`).join('');
  const detailRows=people.filter(p=>p.date&&new Date(p.date).getFullYear()===yr).map(p=>{
    const m=new Date(p.date).getMonth(),isR=p.status==='退職';
    const rs=isR?'opacity:0.42;filter:grayscale(0.4)':'';
    const jd=p.date?new Date(p.date):null,oy=jd&&(new Date()-jd>=365*24*60*60*1000);
    const yb=oy?`<span style="font-size:10px;font-family:var(--mono);background:#E8F0F8;color:#1E4A7A;padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:500">1年経過</span>`:'';
    return `<tr style="${rs}"><td style="font-weight:500">${p.name}${yb}</td>
      <td style="font-family:var(--mono);font-size:12px">${p.date}</td>
      <td style="font-size:12px;color:var(--text2)">${MONTHS[m]}</td>
      <td>${isR?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)"><span class="status-dot sd-gray"></span>退職</span><span style="font-size:11px;color:var(--text3);margin-left:6px">${p.retire||''}</span>`:'<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green)"><span class="status-dot sd-green"></span>在籍</span>'}</td>
      <td style="font-size:12px;color:var(--text2)">${p.tenure||'—'}</td></tr>`;
  }).join('')||`<tr><td colspan="5"><div class="empty">該当者なし</div></td></tr>`;
  document.getElementById('statsContent').innerHTML=`
    <div class="ptabs">${yearTabs}</div>
    <div style="margin-bottom:16px;padding:12px 16px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text2)"><strong style="color:var(--text)">集計方法：</strong>${yr}年に入社した人のうち、現在退職している人の割合です</div>
    <div class="sum-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
      <div class="sum-card"><div class="lbl">${yr}年 入社者数</div><div class="val">${totalJoined}</div><div class="sub">1月〜12月</div></div>
      <div class="sum-card"><div class="lbl">${yr}年 退職者数</div><div class="val red">${totalRetired}</div></div>
      <div class="sum-card"><div class="lbl">${yr}年 離職率</div><div class="val ${parseFloat(rate)>20?'red':parseFloat(rate)>10?'amber':'green'}">${rate}%</div><div class="sub">入社者中の退職割合</div></div>
    </div>

function openDetail(id){const p=people.find(x=>x.id===id);if(!p)return;detailId=id;document.getElementById('d-title').textContent=p.name;renderDetailBody(p);document.getElementById('detailModal').classList.add('open');}
 
function renderDetailBody(p){
  const alerts=getAlerts(p);
  const makeLineChart=(items,maxVal,valFn,titleFn,showBaseline=false)=>{
    if(!items||!items.length)return `<div style="padding:12px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text3);text-align:center">データなし（下の「記録を追加」から入力できます）</div>`;
    const sorted=sortYM(items);
    const vals=sorted.map(valFn);
    const mx=Math.max(...vals,maxVal||1);
    const mn=Math.min(...vals,0);
    const range=mx-mn||1;
    const H=64,W=32,GAP=8;
    const totalW=sorted.length*(W+GAP)-GAP;
    const points=sorted.map((r,i)=>{
      const v=valFn(r);
      const x=i*(W+GAP)+W/2;
      const y=H-Math.round(((v-mn)/range)*(H-8))-4;
      return {x,y,v,r};
    });
    const pathD=points.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
    const dotCol=v=>v<(maxVal*0.5)?'var(--red)':v<(maxVal*0.7)?'#E9A420':'var(--accent)';
    const baselineY=showBaseline?H-Math.round(((100-mn)/range)*(H-8))-4:null;
    return `<div style="overflow-x:auto">
      <svg width="${totalW}" height="${H+20}" style="display:block;overflow:visible">
        ${baselineY!==null?`<line x1="0" y1="${baselineY}" x2="${totalW}" y2="${baselineY}" stroke="var(--border2)" stroke-width="1" stroke-dasharray="4,3"/>`:''} 
        <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
        ${points.map(p=>`
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="${dotCol(p.v)}" stroke="#fff" stroke-width="1.5"/>
          <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="10" fill="var(--text2)" font-family="var(--mono)">${p.v}</text>
        `).join('')}
        ${points.map((p,i)=>`<text x="${p.x}" y="${H+14}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="var(--mono)">${MONTHS[parseInt(p.r.ym.slice(5))-1].replace('月','')}</text>`).join('')}
      </svg>
    </div>`;
  };
  const makeChart=(items,maxVal,colorFn,valFn,titleFn)=>{
    if(!items||!items.length)return `<div style="padding:12px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text3);text-align:center">データなし（下の「記録を追加」から入力できます）</div>`;
    const sorted=sortYM(items),mx=Math.max(...sorted.map(valFn),maxVal||1);
    return `<div class="mchart">${sorted.map(r=>{const v=valFn(r),h=Math.round((v/mx)*52)+4,col=colorFn(v);return `<div class="mchart-b" style="background:${col};height:${h}px" title="${titleFn(r)}"></div>`;}).join('')}</div><div class="mlabs">${sorted.map(r=>`<span>${r.ym.slice(0,4)===String(new Date().getFullYear())?MONTHS[parseInt(r.ym.slice(5))-1]:r.ym.slice(0,7)}</span>`).join('')}</div>`;
  };
  const ccRecList=p.records.cc&&p.records.cc.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${sortYM(p.records.cc).map(r=>`<div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--mono)"><span style="color:var(--text3)">${ymLabel(r.ym)}</span><span style="font-weight:500">${r.score.reduce((a,b)=>a+b,0)}点</span><button onclick="deleteRecord(${p.id},'cc','${r.ym}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:0;line-height:0;font-size:12px" title="削除">✕</button></div>`).join('')}</div>`:'';
  const ccChart=makeLineChart(p.records.cc,30,r=>r.score.reduce((a,b)=>a+b,0),r=>`${ymLabel(r.ym)}: ${r.score.reduce((a,b)=>a+b,0)}点`)+ccRecList;
  const otRecList=p.records.ot&&p.records.ot.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${sortYM(p.records.ot).map(r=>`<div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--mono)"><span style="color:var(--text3)">${ymLabel(r.ym)}</span><span style="font-weight:500">${parseFloat(r.value).toFixed(1)}h</span><button onclick="deleteRecord(${p.id},'ot','${r.ym}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:0;line-height:0;font-size:12px" title="削除">✕</button></div>`).join('')}</div>`:'';
  const otChart=makeChart(p.records.ot,0,v=>v>=45?'var(--red)':v>=30?'#E9A420':'var(--blue)',r=>r.value,r=>`${ymLabel(r.ym)}: ${parseFloat(r.value).toFixed(1)}h`)+otRecList;
  let kpiChart=`<div style="padding:12px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text3);text-align:center">データなし（下の「記録を追加」から入力できます）</div>`;
  const kpiRecList=p.records.kpi&&p.records.kpi.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${sortYM(p.records.kpi).map(r=>`<div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--mono)"><span style="color:var(--text3)">${ymLabel(r.ym)}</span><span style="font-weight:500">${typeof r.rate==='number'?r.rate.toFixed(1):r.rate}%</span><button onclick="deleteRecord(${p.id},'kpi','${r.ym}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:0;line-height:0;font-size:12px" title="削除">✕</button></div>`).join('')}</div>`:'';
  if(p.records.kpi&&p.records.kpi.some(r=>r.rate!=null)){
    const sorted=sortYM(p.records.kpi).filter(r=>r.rate!=null);
    kpiChart=makeLineChart(sorted,100,r=>r.rate,r=>`${ymLabel(r.ym)}: ${r.rate}%`,true);
    kpiChart+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">${sorted.map(r=>`<div style="background:var(--surface2);border-radius:var(--r);padding:5px 8px;font-size:11px;font-family:var(--mono)"><span style="color:var(--text3)">${ymLabel(r.ym)} </span><span style="font-weight:500">${r.rate.toFixed(1)}%</span></div>`).join('')}</div>`;
    kpiChart+=kpiRecList;
  } else { kpiChart+=kpiRecList; }
  let absChart=`<div style="padding:12px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text3);text-align:center">データなし（下の「記録を追加」から入力できます）</div>`;

  }
  if(p.records.abs&&p.records.abs.length){
    const abRecList=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${sortYM(p.records.abs).map(r=>`<div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--mono)"><span style="color:var(--text3)">${ymLabel(r.ym)}</span><span style="font-weight:500">欠${r.absent} 遅${r.late}</span><button onclick="deleteRecord(${p.id},'abs','${r.ym}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:0;line-height:0;font-size:12px" title="削除">✕</button></div>`).join('')}</div>`;
    absChart+=abRecList;
  }
  const alertHTML=alerts.length
    ?alerts.map(a=>`<div class="al-item ${a.type}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${a.msg}</div>`).join('')
    :`<div class="al-item ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>アラートなし</div>`;
  document.getElementById('detailBody').innerHTML=`
    <div class="di-grid">
      <div class="di-box"><div class="dl">入社日</div><div class="dv" style="font-family:var(--mono);font-size:13px">${p.date||'—'}</div></div>
      <div class="di-box"><div class="dl">在籍状況</div><div class="dv">${p.status}</div></div>

            <div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;color:${rc};letter-spacing:1px">${stars} 離職懸念 ${iv.risk}/5</span><button onclick="deleteInterview(${p.id},'${iv.ym}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:4px;font-size:11px;line-height:1" title="削除">✕ 削除</button></div>

      }).join('')}</div>
    </div>`:''}
    ${p.note?`<div style="margin-bottom:20px;padding:10px 14px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--text2)"><span style="font-size:10px;font-weight:700;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-right:8px">備考</span>${p.note}</div>`:''}

        <div style="font-size:11px;font-weight:700;margin-bottom:4px;color:var(--text2)">1on1 面談テキストをAI分析</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:10px">ZoomやGoogle Meetの文字起こしをそのままペーストしてください</div>
        <div class="if-grid" style="grid-template-columns:1fr 1fr;margin-bottom:10px">
          <div class="fr"><label>実施日</label><input type="date" id="oo-date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="fr"><label>面談者</label><select id="oo-interviewer"><option value="西田 祐恵">西田 祐恵</option><option value="小林 達也">小林 達也</option></select></div>
        </div>
        <div class="fr" style="margin-bottom:10px"><label>面談テキスト</label><textarea id="oo-text" style="min-height:120px;font-size:12px" placeholder="例）&#10;A: 最近どうですか？&#10;B: 少し業務量が多くて疲れています..."></textarea></div>
        <div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-primary" onclick="analyzeInterview()">AI分析する</button><button class="btn" onclick="toggleInlineForm('oneOnOneForm')">閉じる</button></div>
        <div id="oo-result" style="display:none"></div>
      </div>
    </div>`;
}
 
function deleteRecord(id,type,ym){
  if(!confirm(`${ymLabel(ym)}のデータを削除しますか？`))return;
  const p=people.find(x=>x.id===id);if(!p)return;
  p.records[type]=p.records[type].filter(r=>r.ym!==ym);
  save();savePersonToGAS(p);renderDetailBody(p);renderAll();
}
function deleteInterview(id,ym){
  if(!confirm(`${ymLabel(ym)}の面談分析を削除しますか？`))return;
  const p=people.find(x=>x.id===id);if(!p)return;
  p.records.interviews=p.records.interviews.filter(r=>r.ym!==ym);
  save();savePersonToGAS(p);renderDetailBody(p);
}
function toggleInlineForm(id){document.querySelectorAll('.inline-form').forEach(f=>{if(f.id!==id)f.classList.remove('open');});document.getElementById(id).classList.toggle('open');}
function saveCC(){const p=people.find(x=>x.id===detailId);if(!p)return;const ym=document.getElementById('cc-ym').value;if(!ym)return;const score=[+document.getElementById('cc-1').value||0,+document.getElementById('cc-2').value||0,+document.getElementById('cc-3').value||0,+document.getElementById('cc-4').value||0,+document.getElementById('cc-5').value||0];p.records.cc=p.records.cc.filter(r=>r.ym!==ym);p.records.cc.push({ym,score});save();savePersonToGAS(p);renderDetailBody(p);renderAll();document.getElementById('ccForm').classList.remove('open');}
function saveOT(){const p=people.find(x=>x.id===detailId);if(!p)return;const ym=document.getElementById('ot-ym').value;if(!ym)return;const value=parseFloat(document.getElementById('ot-v').value)||0;p.records.ot=p.records.ot.filter(r=>r.ym!==ym);p.records.ot.push({ym,value});save();savePersonToGAS(p);renderDetailBody(p);renderAll();document.getElementById('otForm').classList.remove('open');}
function saveKPI(){const p=people.find(x=>x.id===detailId);if(!p)return;const ym=document.getElementById('kpi-ym').value;if(!ym)return;const rate=parseFloat(document.getElementById('kpi-r').value);if(isNaN(rate)){alert('達成率を入力してください');return;}p.records.kpi=p.records.kpi.filter(r=>r.ym!==ym);p.records.kpi.push({ym,rate:parseFloat(rate.toFixed(1))});save();savePersonToGAS(p);renderDetailBody(p);renderAll();document.getElementById('kpiForm').classList.remove('open');}
function saveAbs(){const p=people.find(x=>x.id===detailId);if(!p)return;const ym=document.getElementById('abs-ym').value;if(!ym)return;const absent=+document.getElementById('abs-ab').value||0,late=+document.getElementById('abs-lt').value||0;p.records.abs=p.records.abs.filter(r=>r.ym!==ym);p.records.abs.push({ym,absent,late});save();savePersonToGAS(p);renderDetailBody(p);renderAll();document.getElementById('absForm').classList.remove('open');}
 
function analyzeInterview(){
  const p=people.find(x=>x.id===detailId);if(!p)return;
  const date=document.getElementById('oo-date').value,interviewer=document.getElementById('oo-interviewer').value,text=document.getElementById('oo-text').value.trim();
  if(!date){alert('実施日を入力してください');return;}if(!text){alert('面談テキストを入力してください');return;}
  const ym=date.slice(0,7),resultEl=document.getElementById('oo-result');
  resultEl.style.display='block';resultEl.innerHTML=`<div style="padding:16px;background:var(--surface2);border-radius:var(--r);font-size:13px;color:var(--text3);text-align:center">AI分析中...</div>`;
  const prompt=`あなたはHRの専門家です。以下は${p.name}さん（入社日:${p.date}）の1on1面談の記録です（実施日:${date}、面談者:${interviewer}）。\n以下の4点を日本語で分析してください。必ずJSON形式のみで返答してください（マークダウン不可）：\n{\n  "positive": ["ポジティブな点を箇条書きで3点以内"],\n  "negative": ["ネガティブな点・懸念事項を箇条書きで3点以内"],\n  "risk": 1から5の整数（1=離職懸念なし、5=離職懸念が非常に高い）,\n  "riskReason": "離職懸念度の根拠を1文で",\n  "actions": ["フォロー施策案を箇条書きで3点以内"]\n}\n\n面談記録：\n${text}`;
  fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})})
  .then(r=>r.json()).then(data=>{
    const raw=data.content?.find(b=>b.type==='text')?.text||'';let result;
    try{result=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){resultEl.innerHTML=`<div style="padding:12px;background:var(--red-light);border-radius:var(--r);font-size:12px;color:var(--red)">解析エラーが発生しました。</div>`;return;}
    const stars='★'.repeat(result.risk)+'☆'.repeat(5-result.risk),riskCol=result.risk>=4?'var(--red)':result.risk>=3?'var(--amber)':'var(--green)';
    const html=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden">
      <div style="padding:12px 16px;background:var(--accent);color:#fff;font-size:12px;font-weight:700">AI面談分析結果 — ${date} ${p.name} <span style="font-weight:400;opacity:.8">（面談者: ${interviewer}）</span></div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">ポジティブな点</div>${result.positive.map(x=>`<div style="display:flex;gap:6px;font-size:12px;margin-bottom:4px;color:var(--green)"><span>✓</span><span>${x}</span></div>`).join('')}</div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">ネガティブな点・懸念事項</div>${result.negative.map(x=>`<div style="display:flex;gap:6px;font-size:12px;margin-bottom:4px;color:var(--red)"><span>!</span><span>${x}</span></div>`).join('')}</div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">離職懸念度</div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:22px;letter-spacing:2px;color:${riskCol}">${stars}</span><span style="font-size:20px;font-weight:700;font-family:var(--mono);color:${riskCol}">${result.risk}/5</span></div><div style="font-size:12px;color:var(--text2);margin-top:6px">${result.riskReason}</div></div>
      <div style="padding:14px 16px"><div style="font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">フォロー施策案</div>${result.actions.map((x,i)=>`<div style="display:flex;gap:6px;font-size:12px;margin-bottom:4px"><span style="color:var(--text3);font-family:var(--mono)">${i+1}.</span><span>${x}</span></div>`).join('')}</div>
      <div style="padding:10px 16px;background:var(--surface2);border-top:1px solid var(--border)">
        <button class="btn btn-primary" id="oo-save-btn" style="font-size:12px;padding:5px 12px">この結果を保存する</button>
        <span style="font-size:11px;color:var(--text3);margin-left:8px">ブラウザに保存 → ポップアップ内「面談分析履歴」に表示されます</span>
      </div></div>`;
    resultEl.innerHTML=html;
    document.getElementById('oo-save-btn').addEventListener('click',()=>saveInterview(ym,date,interviewer,result));
  }).catch(()=>{resultEl.innerHTML=`<div style="padding:12px;background:var(--red-light);border-radius:var(--r);font-size:12px;color:var(--red)">通信エラーが発生しました。</div>`;});
}
function saveInterview(ym,date,interviewer,result){const p=people.find(x=>x.id===detailId);if(!p)return;if(!p.records.interviews)p.records.interviews=[];p.records.interviews=p.records.interviews.filter(r=>r.ym!==ym);p.records.interviews.push({ym,date,interviewer,...result});save();savePersonToGAS(p);renderDetailBody(p);}
 
function openAdd(){document.getElementById('a-name').value='';document.getElementById('a-date').value=new Date().toISOString().slice(0,10);document.getElementById('a-date1y').value='';document.getElementById('a-retire').value='';document.getElementById('a-status').value='在籍';document.getElementById('a-tenure').value='';document.getElementById('a-mentor').value='';document.getElementById('a-manager').value='';document.getElementById('a-note').value='';document.getElementById('addModal').classList.add('open');}
function addPerson(){const name=document.getElementById('a-name').value.trim();if(!name){alert('氏名を入力してください');return;}const newP={id:nextId++,name,date:document.getElementById('a-date').value,date1y:document.getElementById('a-date1y').value,retire:document.getElementById('a-retire').value,status:document.getElementById('a-status').value,tenure:document.getElementById('a-tenure').value,mentor:document.getElementById('a-mentor').value,manager:document.getElementById('a-manager').value,note:document.getElementById('a-note').value,records:{cc:[],ot:[],kpi:[],abs:[]}};people.push(newP);save();savePersonToGAS(newP);closeModal('addModal');renderAll();}
function openEditById(id){const p=people.find(x=>x.id===id);if(!p)return;editingId=id;document.getElementById('e-name').value=p.name;document.getElementById('e-date').value=p.date||'';document.getElementById('e-date1y').value=p.date1y||'';document.getElementById('e-retire').value=p.retire||'';document.getElementById('e-status').value=p.status;document.getElementById('e-tenure').value=p.tenure||'';document.getElementById('e-mentor').value=p.mentor||'';document.getElementById('e-manager').value=p.manager||'';document.getElementById('e-note').value=p.note||'';document.getElementById('editModal').classList.add('open');}
function openEditFromDetail(){closeModal('detailModal');openEditById(detailId);}
function saveEdit(){const p=people.find(x=>x.id===editingId);if(!p)return;p.name=document.getElementById('e-name').value.trim()||p.name;p.date=document.getElementById('e-date').value||p.date;p.date1y=document.getElementById('e-date1y').value;p.retire=document.getElementById('e-retire').value;p.status=document.getElementById('e-status').value;p.tenure=document.getElementById('e-tenure').value;p.mentor=document.getElementById('e-mentor').value;p.manager=document.getElementById('e-manager').value;p.note=document.getElementById('e-note').value;save();savePersonToGAS(p);closeModal('editModal');renderAll();if(detailId===editingId)openDetail(detailId);}
function deletePerson(id){if(!confirm('削除しますか？'))return;people=people.filter(x=>x.id!==id);save();deletePersonFromGAS(id);renderAll();}
 
const pageTitles={list:'入社者一覧',alerts:'アラート',stats:'離職率・統計'};
function showPage(name,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');if(btn)btn.classList.add('active');document.getElementById('pageTitle').textContent=pageTitles[name]||name;if(name==='alerts')renderAlerts();if(name==='stats')renderStats();}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.getElementById('sbBadge').onclick=function(){showPage('alerts',document.querySelectorAll('.nav-item')[1]);};
 
function exportCSV(){const rows=[['氏名','入社日','退職日','在籍状況','在籍期間','メンター','部長','CC最新(年月)','CC最新スコア','残業最新(年月)','残業最新(h)','KPI最新(年月)','KPI達成率']];people.forEach(p=>{const cc=latestCC(p),ot=latestOT(p),kpi=latestKPI(p);rows.push([p.name,p.date,p.retire||'',p.status,p.tenure||'',p.mentor||'',p.manager||'',cc?ymLabel(cc.ym):'',cc?cc.score:'',ot?ymLabel(ot.ym):'',ot?ot.v:'',kpi?ymLabel(kpi.ym):'',kpi?kpi.rate+'%':'']);});const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`onboarding_${new Date().toISOString().slice(0,10)}.csv`;a.click();}
 
function renderAll(){renderSummary();renderTable();}
loadFromGAS();
</script>
